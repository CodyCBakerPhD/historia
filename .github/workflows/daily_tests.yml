name: Daily tests

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  DailyTests:
    permissions:
      contents: read
    uses: ./.github/workflows/testing.yml
    secrets: inherit
    with:
      marks: "not remote"

  DailyTestsRemote:
    permissions:
      contents: read
    uses: ./.github/workflows/testing.yml
    secrets: inherit
    with:
      marks: remote

  NotifyOnFailure:
    permissions: {}
    runs-on: ubuntu-latest
    needs: [DailyTests]
    if: ${{ always() && needs.DailyTests.result == 'failure' }}
    steps:
      - uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: Historia Daily Tests"
          to: cody.c.baker.phd@gmail.com
          from: Historia <historia@users.noreply.github.com>
          body: "The daily test workflow failed, please check status at https://github.com/CodyCBakerPhD/historia/actions/workflows/daily_tests.yml"

  NotifyOnRemoteFailure:
    permissions: {}
    runs-on: ubuntu-latest
    needs: [DailyTestsRemote]
    if: ${{ always() && needs.DailyTestsRemote.result == 'failure' }}
    steps:
      - uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: Historia Daily Remote Tests"
          to: cody.c.baker.phd@gmail.com
          from: Historia <historia@users.noreply.github.com>
          body: "The daily remote test workflow failed, please check status at https://github.com/CodyCBakerPhD/historia/actions/workflows/daily_tests.yml"
