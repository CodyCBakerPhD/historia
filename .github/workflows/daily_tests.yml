name: Daily tests

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  DailyTests:
    permissions:
      contents: read
    uses: ./.github/workflows/testing.yml
    secrets: inherit

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [DailyTests]
    if: ${{ always() && needs.DailyTests.result == 'failure' }}
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: Historia Daily Tests"
          to: cody.c.baker.phd@gmail.com
          from: Historia
          body: "The daily test workflow failed, please check status at https://github.com/CodyCBakerPhD/historia/actions/workflows/daily_tests.yml"
