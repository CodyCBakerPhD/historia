name: Testing

on:
  pull_request:
  workflow_call:
    inputs:
      pytest_markexpr:
        description: "Expression for pytest -m"
        required: false
        default: "not remote"
        type: string
      os_list:
        description: "JSON array of OS runners"
        required: false
        default: '["ubuntu-latest"]'
        type: string
      python_list:
        description: "JSON array of Python versions"
        required: false
        default: '["3.13"]'
        type: string

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}

jobs:
  Testing:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(github.event_name == 'workflow_call' && inputs.os_list || '["ubuntu-latest"]') }}
        python-version: ${{ fromJson(github.event_name == 'workflow_call' && inputs.python_list || '["3.13"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e . pytest-cov

      - name: Run tests
        run: pytest ${{ github.event_name == 'workflow_call' && format('-m "{0}"', inputs.pytest_markexpr) || '' }} --cov=src/historia --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
