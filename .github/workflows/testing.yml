name: Testing

on:
  workflow_call:
    inputs:
      marks:
        description: "Pytest mark expression passed to -m (e.g. 'not remote' or 'remote'). Omit to run all tests"
        type: string
        required: false

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}

jobs:
  Testing:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install
        run: pip install -e . --group dev pytest-cov

      - name: Run tests
        run: pytest ${MARKS:+-m "$MARKS"} --cov=src/historia --cov-report=xml
        env:
          MARKS: ${{ inputs.marks }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
