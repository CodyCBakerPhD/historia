name: Daily link checker

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  LinkChecker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --exclude '^https://github\.com/CodyCBakerPhD/historia/blob/[^/]+/src/.+#L\d+(-L\d+)?$'
            --exclude '^https://api\.github\.com/graphql$'
            --exclude '^https://api\.github\.com/(users|orgs)/(%7Bowner%7D|\{owner\})$'
            --exclude '^https://github\.com/((users|orgs)/)?(%7Blogin%7D|\{login\})/projects/(%7Bnumber%7D|\{number\})$'
            --exclude '^https://github\.com/[^/]+/projects/\d+/?$'
            --exclude '^https://github\.com/(users|orgs)/[^/]+/projects/\d+/?$'
            --exclude '^https://github\.com/owner/repo/(issues|pull)/\d+$'
            '**/*.md'
            '**/*.rst'
            '**/*.py'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [LinkChecker]
    if: ${{ always() && needs.LinkChecker.result == 'failure' }}
    steps:
      - uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: Historia Daily Link Checker"
          to: cody.c.baker.phd@gmail.com
          from: Historia
          body: "The daily link checker workflow failed, please check status at https://github.com/CodyCBakerPhD/historia/actions/workflows/daily_link_checker.yml"
