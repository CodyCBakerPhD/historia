name: Build and upload latest release Docker image to GHCR

on:
  release:
    types:
      - published

jobs:
  release-image:
    name: Build and upload release image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Derive image tags
        id: image_tags
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version_tag="${RELEASE_TAG#v}"
          echo "latest=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_OUTPUT"
          echo "versioned=ghcr.io/${GITHUB_REPOSITORY,,}:${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets._GITHUB_API_KEY }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.latest
          load: true
          push: false
          tags: ${{ steps.image_tags.outputs.latest }}

      - name: Add version tag
        run: docker tag "${{ steps.image_tags.outputs.latest }}" "${{ steps.image_tags.outputs.versioned }}"

      - name: Smoke test image
        run: docker run --rm "${{ steps.image_tags.outputs.latest }}"

      - name: Push to GHCR
        run: |
          docker push "${{ steps.image_tags.outputs.latest }}"
          docker push "${{ steps.image_tags.outputs.versioned }}"
