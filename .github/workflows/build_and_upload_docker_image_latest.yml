name: Build and upload latest release Docker image to GHCR

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Release to PyPI]
    types: [completed]

jobs:
  release-image:
    name: Build and upload release image
    # When triggered via workflow_run, only proceed if the upstream Release to PyPI workflow succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve latest release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # This workflow is triggered via workflow_run / workflow_dispatch, so github.event.release
          # is not populated. Resolve the tag from the latest published GitHub release instead.
          release_tag="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName --jq .tagName)"
          if [ -z "${release_tag}" ]; then
            echo "Could not resolve latest release tag." >&2
            exit 1
          fi
          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Derive image tags
        id: image_tags
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          version_tag="${RELEASE_TAG#v}"
          echo "latest=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_OUTPUT"
          echo "versioned=ghcr.io/${GITHUB_REPOSITORY,,}:${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets._GITHUB_API_KEY }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: containers/Dockerfile.latest
          load: true
          push: false
          tags: ${{ steps.image_tags.outputs.latest }}

      - name: Add version tag
        run: docker tag "${{ steps.image_tags.outputs.latest }}" "${{ steps.image_tags.outputs.versioned }}"

      - name: Smoke test image
        run: docker run --rm "${{ steps.image_tags.outputs.latest }}"

      - name: Push to GHCR
        run: |
          docker push "${{ steps.image_tags.outputs.latest }}"
          docker push "${{ steps.image_tags.outputs.versioned }}"
