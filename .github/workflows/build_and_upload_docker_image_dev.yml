name: Test dev container (and push on merge)

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-push:
    name: Build and test dev image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image name
        id: image_name
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}:dev" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.dev
          load: true
          push: false
          tags: ${{ steps.image_name.outputs.value }}

      - name: Smoke test image
        run: docker run --rm "${{ steps.image_name.outputs.value }}"

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets._GITHUB_API_KEY }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: docker push "${{ steps.image_name.outputs.value }}"
