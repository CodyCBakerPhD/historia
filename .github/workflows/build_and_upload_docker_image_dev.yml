name: Test dev container (and push on merge)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-push:
    name: Build and test dev image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.dev
          load: true
          push: false
          tags: ghcr.io/codycbakerphd/historia:dev

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets._GITHUB_API_KEY }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/codycbakerphd/historia:dev
