name: Version Check

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "pyproject.toml"

jobs:
  version-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          PR_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:pyproject.toml | python3 -c "import sys, tomllib; print(tomllib.loads(sys.stdin.read())['project']['version'])")
          echo "Base version: $BASE_VERSION"
          echo "PR version:   $PR_VERSION"
          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "::error::Version has not been bumped. Please update the version in pyproject.toml."
            exit 1
          fi
          echo "Version bumped from $BASE_VERSION to $PR_VERSION ✓"
