name: Testing (PR)

on:
  pull_request:

jobs:
  Testing:
    permissions:
      contents: read
    uses: ./.github/workflows/testing.yml
    secrets: inherit
    with:
      marks: "not remote"

  TestingRemote:
    permissions:
      contents: read
    uses: ./.github/workflows/testing.yml
    secrets: inherit
    with:
      marks: remote
